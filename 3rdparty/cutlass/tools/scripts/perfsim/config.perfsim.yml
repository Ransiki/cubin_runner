PerfSim:
  enableMorph: false
  pic: false
  perfgen:
    -PERFSIM:knob:
      - '''NVPerfsim::PerfSim::NoOutputTimeout 1 9000000'''
      - '''NVPerfsim::SM::MorphDumpInstances {0;;}'''
    -debug: 0
    -dont-fail-on-p4-check:
    -info: ~
    -mail-to: ~
    -no-sync-check-fatal:
    -project:http:server: ~
    -queue: PERFSIM o_cpu_128G_24H
    # -queue: ~
    -rc: $chip/${chip}_flow.perfsim.rc
    -target: PERFSIM
    -testgenArgsMore:
      - -maxMemory
      - 64000

