# 
# NOTE: THIS FILE IS DEPRECATED. DO NOT USE IT
#
# overall workflow settings
all:
  chip: ~

APIC_Capture:
  # set this to override the cuda capturer that will be used (a qualitifed release from /home/scratch.svc_compute_arch/release/cuda_apic_all)
  # absolute path to the cuda_apic_capture.pl script
  cuda_capturer: ~

  # capture options to be passed to cuda_apic_capture.pl
  # do not specify --pp_args=, this is done through the postprocess/options setting below
  capture:
    options:
      # even though this is the default it is here as a placeholder to create the list
      - --capture_mode=discrete

  # post process options can be stored in the workload CADI record, those options and these options are union-ed
  # to produce the runtime options which are then stored as the settings in the APIC CADI record
  # These options are passed in --pp_args
  # The format is the same as the capture/options above, [] means empty list
  postprocess:
    options: []

# settings for the Trace3D generation step
Trace3D_Gen:
  # more options to pass to cudaReplayer
  cuda_replay_options: '-MergeUVACtx'
  # environment variables to set for cudaReplayer execution
  cuda_replay_env:
    CUDA_FORCE_PTX_JIT: 0
    CUDA_TSG_CHANNEL_COUNT: 1

  # set this to override the cuda replayer that will be used (default is to tie it to the cuda_capturer used above)
  # absolute path to the cudaReplayer executable
  cuda_replayer: ~

  # more options to pass to openclReplayer
  opencl_replay_options: ''
  # environment variables to set for openclReplayer execution
  opencl_replay_env: {}

  # if more time is needed increase the H value (hours), or use a D value (days)
  lsfQueue: o_cpu_8G_24H

  cuda2ctl_args: {}

  # pass these args to run-ace.pl
  ACE_args:
    pmMode: PMMODE_NOCOLLAPSE

  # see https://wiki.nvidia.com/gpuhwdept/index.php/AModel/Knobs for syntax
  # Remember to quote special yaml characters like [] and {}
  # Examples:
  #   TuringCtaShader::instructionsBeforeYield: '{4;;4;;4;;4}'
  knobs:
    gp10x:
      knobsCap:
        PascalComputeWarpState::ignoreMisalignedAddrError: 1
        Shader::checkUninitializedRegisters: 0
        ChannelObject::shareSubchannelsAcrossTSGs: 1
        Shader::checkUninitializedLocalMemory: 0
        PascalCompute::uninitializedPredicateCheck: 1
        PascalCompute::uninitializedCCCheck: 1
        PascalProgram::refshaderNoPrintCountersAndKnobs: 1
        PascalComputeWarpState::ignoreApiRetOnEmptyStackError: 1
        PascalProgram::refShaderDriverMode: 1
        PascalComputeClassFE::logMethods: 0
        PascalShaderState3D::ignoreMisalignedAddrError: 1
        PascalQmd::pointerSanityCheck: 0
        PascalQmd::ignoreSanityChecks: 1
      knobsRep:
        PascalComputeWarpState::ignoreMisalignedAddrError: 1
